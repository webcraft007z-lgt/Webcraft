  // === SANITY FETCH with improved image handling ===
  const SANITY_PROJECT_ID = "sa8b5pq9";
  const SANITY_DATASET = "production";

  async function fetchSanity(query) {
    const url = `https://${SANITY_PROJECT_ID}.api.sanity.io/v1/data/query/${SANITY_DATASET}?query=${encodeURIComponent(query)}`;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      return data.result;
    } catch (err) {
      console.warn("Sanity fetch failed", err);
      return null;
    }
  }

  // Get image URL from Sanity asset (works for uploaded images)
  function getImageUrl(ref) {
    if (!ref) return '';
    if (typeof ref === 'string' && ref.startsWith('http')) return ref;
    const assetId = ref.asset?._ref || ref;
    if (typeof assetId === 'string' && assetId.startsWith('image-')) {
      const parts = assetId.split('-');
      const id = parts[1];
      const dimensions = parts[2];
      const ext = dimensions?.split('.')[1] || 'jpg';
      return `https://cdn.sanity.io/images/${SANITY_PROJECT_ID}/${SANITY_DATASET}/${id}.${ext}`;
    }
    return '';
  }
